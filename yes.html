<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Movie Date 🎬</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="yes_style.css">
</head>

<body>

    <div class="container">

        <h1 class="header_text">
            Hurrayyyy!! ❤️
        </h1>

        <p class="message">
            I can't wait to see you tomorrow! 🥰
        </p>

        <h2 class="movie_title">
            Which movie should we watch together? 🍿❤️
        </h2>

        <!-- Jumping Chibi -->
        <img src="Jump.gif" alt="Happy Jump" class="jump-gif">

        <div class="movie_container">

            <!-- Toy Story -->
            <div class="movie_card">
                <img src="toy story.jpg" alt="Toy Story 5">

                <button onclick="window.location.href='restaurant.html'">
                    🍿 Toy Story 5
                </button>
            </div>

            <!-- Supergirl -->
            <div class="movie_card">
                <img src="supergirl1.jpg" alt="Supergirl">

                <button onclick="window.location.href='restaurant.html'">
                    🦸 Supergirl
                </button>
            </div>

            <!-- Minions -->
            <div class="movie_card">
                <img src="minions1.jpg" alt="Minions & Monsters">

                <button onclick="window.location.href='restaurant.html'">
                    🍌 Minions & Monsters
                </button>
            </div>

        </div>

    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ==========================
        // Background Music
        // ==========================

        const music = document.getElementById("bgMusic");

        if (localStorage.getItem("musicStarted") === "true") {

            const savedTime = localStorage.getItem("musicTime");

            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }

            music.play().catch(() => {});
        }

        setInterval(() => {

            if (!music.paused) {
                localStorage.setItem("musicTime", music.currentTime);
            }

        }, 500);
    </script>

</body>

</html>
