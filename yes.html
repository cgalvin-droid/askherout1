<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Movie Date 🎬</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="yes_style.css">

</head>

<body>

<!-- Jumping Chibi -->
<img src="Jump.gif" alt="Happy Jump" class="jump-gif">

<div class="container">

    <h1 class="header_text">
        Hurrayyyy!! ❤️
    </h1>

    <p class="message">
        I can't wait to see you tomorrow! 🥰
    </p>

    <h2 class="movie_title">
        Please choose a movie you'd like to watch with me 🍿❤️
    </h2>

    <div class="movie_container">

        <div class="movie_card">

            <img src="toy story.jpg" alt="Toy Story 5">

            <button onclick="alert('Yay! Toy Story 5 it is! 🧸❤️')">
                Toy Story 5
            </button>

        </div>

        <div class="movie_card">

            <img src="supergirl1.jpg" alt="Supergirl">

            <button onclick="alert('Awesome! Supergirl! 🦸‍♀️❤️')">
                Supergirl
            </button>

        </div>

        <div class="movie_card">

            <img src="minions1.jpg" alt="Minions">

            <button onclick="alert('Banana! 🍌 Minions & Monsters it is! 💛')">
                Minions & Monsters
            </button>

        </div>

    </div>

</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const music=document.getElementById("bgMusic");

// Continue music
if(localStorage.getItem("musicStarted")==="true"){

    const savedTime=localStorage.getItem("musicTime");

    if(savedTime){
        music.currentTime=parseFloat(savedTime);
    }

    music.play().catch(()=>{});

}

// Save music position
setInterval(()=>{
    if(!music.paused){
        localStorage.setItem("musicTime",music.currentTime);
    }
},500);

</script>

</body>
</html>
