<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Go Out With Me? ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1 class="header_text">
            Do you wanna <br> go out with me?
        </h1>

        <h2 class="sub_text">
            Are you free tomorrow? 🌸
        </h2>

        <div class="gif_container">
            <img src="Cute.gif" alt="Cute Chibi">
        </div>

        <div class="buttons">

            <button class="btn yes-btn" onclick="goToYes()">
                Yes 💖
            </button>

            <button class="btn no-btn"
                    id="noButton"
                    onmouseover="moveButton()"
                    onclick="moveButton()">
                No 🏃
            </button>

        </div>

    </div>

    <!-- Background Music -->
    <audio id="bgMusic" preload="auto" loop>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <script>

        const music = document.getElementById("bgMusic");

        // Restore previous playback time
        const savedTime = localStorage.getItem("musicTime");

        if (savedTime) {
            music.currentTime = parseFloat(savedTime);
        }

        // Save playback position every half second
        setInterval(() => {
            if (!music.paused) {
                localStorage.setItem("musicTime", music.currentTime);
            }
        }, 500);

        function goToYes() {

            localStorage.setItem("musicStarted", "true");

            music.play().then(() => {

                // Give the music a brief moment to start
                setTimeout(() => {
                    window.location.href = "yes.html";
                }, 250);

            }).catch(() => {

                // If playback is blocked, still continue
                window.location.href = "yes.html";

            });

        }

        function moveButton() {

            const button = document.getElementById("noButton");

            const maxX = window.innerWidth - button.offsetWidth - 20;
            const maxY = window.innerHeight - button.offsetHeight - 20;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            button.style.position = "fixed";
            button.style.left = x + "px";
            button.style.top = y + "px";

        }

    </script>

</body>

</html>
