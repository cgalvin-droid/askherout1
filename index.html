<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
<h1 class="header_text">Do you wanna<br>go out with me?</h1>
<h2 class="sub_text">Are you free tomorrow? 🌸</h2>
<div class="gif_container"><img src="cute.gif" alt="cute"></div>
<div class="buttons">
<button class="btn yes-btn" onclick="window.location='yes.html'">Yes 💖</button>
<button class="btn no-btn" id="noButton" onmouseover="moveButton()" onclick="moveButton()">No 🏃</button>
</div>
</div>
<script>
function moveButton(){
const b=document.getElementById("noButton");
const x=Math.random()*(window.innerWidth-b.offsetWidth);
const y=Math.random()*(window.innerHeight-b.offsetHeight);
b.style.position="fixed";
b.style.left=x+"px";
b.style.top=y+"px";
}
</script>
</body></html>
