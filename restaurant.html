<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dinner Date ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="restaurant_style.css">
</head>

<body>

    <div class="container">

        <h1 class="header_text">
            Yay!! One more choice 💕
        </h1>

        <p class="message">
            Now let's decide where we'll have dinner after the movie! 🍽️🥰
        </p>

        <!-- Cute Eating GIF -->
        <div class="gif_container">
            <img src="eating.gif" alt="Cute Dinner Date" class="eating_gif">
        </div>

        <h2 class="restaurant_title">
            Which restaurant would you like? ❤️
        </h2>

        <div class="restaurant_container">

            <!-- Rossini -->
            <div class="restaurant_card">
                <img src="rossini.jpeg" alt="Rossini">

                <button onclick="chooseRestaurant('Rossini')">
                    🍝 Rossini
                </button>
            </div>

            <!-- Wildflour -->
            <div class="restaurant_card">
                <img src="wildflour.jpeg" alt="Wildflour">

                <button onclick="chooseRestaurant('Wildflour')">
                    🥩 Wildflour
                </button>
            </div>

            <!-- Manam -->
            <div class="restaurant_card">
                <img src="manam.jpeg" alt="Manam">

                <button onclick="chooseRestaurant('Manam')">
                    🍛 Manam
                </button>
            </div>

        </div>

    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>

        // ==========================
        // Background Music
        // ==========================

        const music = document.getElementById("bgMusic");

        if (localStorage.getItem("musicStarted") === "true") {

            const savedTime = localStorage.getItem("musicTime");

            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }

            music.play().catch(() => {});

        }

        setInterval(() => {

            if (!music.paused) {
                localStorage.setItem("musicTime", music.currentTime);
            }

        }, 500);

        // ==========================
        // Restaurant Selection
        // ==========================

        function chooseRestaurant(restaurant) {

            // Save restaurant (optional, for future use)
            localStorage.setItem("selectedRestaurant", restaurant);

            // Go to the final page
            window.location.href = "final.html";
        }

    </script>

</body>

</html>
