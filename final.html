<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's a Date! ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #FFD1DC;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 30px;
            z-index: 2;
        }

        .celebrate-gif {
            width: 320px;
            max-width: 90%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 70px;
            color: #d63384;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .message {
            font-size: 30px;
            color: #8a3d5d;
            line-height: 1.6;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .heart {
            font-size: 70px;
            animation: pulse 1.3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .floating-heart {
            position: absolute;
            bottom: -40px;
            font-size: 28px;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            to {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        .footer {
            margin-top: 30px;
            font-size: 22px;
            color: #b91d6b;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Replace with your favorite cute GIF -->
        <img src="backhug.gif" alt="Cute Hug" class="celebrate-gif">

        <h1>It's a Date! 💖</h1>

        <div class="message">
            Yayyyyy!! 💕<br><br>

            Thank you for saying yes.  😜 <br><br>

            <strong>See you tomorrow, gorgeous! ❤️</strong>
        </div>

        <div class="heart">💗</div>

        <div class="footer">
            Can't wait to make memories with you. ✨
        </div>

    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Continue background music
        const music = document.getElementById("bgMusic");

        if (localStorage.getItem("musicStarted") === "true") {

            const savedTime = localStorage.getItem("musicTime");

            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }

            music.play().catch(() => { });

        }

        setInterval(() => {
            if (!music.paused) {
                localStorage.setItem("musicTime", music.currentTime);
            }
        }, 500);

        // Floating hearts
        function createHeart() {

            const heart = document.createElement("div");

            heart.className = "floating-heart";
            heart.innerHTML = ["💖", "💕", "💗", "💞", "❤️"][Math.floor(Math.random() * 5)];

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (4 + Math.random() * 3) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createHeart, 300);
    </script>

</body>

</html>
